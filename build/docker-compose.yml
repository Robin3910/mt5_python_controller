# =====================================================================
# MT5 多节点跟单系统 · Linux 部署版
# ---------------------------------------------------------------------
# 拓扑：mysql + redis + backend + nginx 全部跑在 Docker 里；
# MT5 节点端在各自主机上原生运行。
# 本文件 nginx 固定发布 80/443；Windows 开发机请用 docker-compose.windows.yml。
#
# 前置条件：
#   1. 安装 Docker Desktop（建议使用 WSL2 后端）。
#   2. 复制并按需修改环境变量：copy .env.example .env
#      （前端会在 docker compose build 时自动 npm ci && npm run build）
#
# 启动 / 运维（在 build/ 目录下，或从仓库根目录加 -f build/docker-compose.yml）：
#   docker compose up -d --build
#   docker compose ps
#   docker compose logs -f backend
#   docker compose exec backend alembic upgrade head
#   docker compose down
#
# 项目名称（影响容器/网络/卷前缀，默认 mt5hub-server）：
#   本文件顶部 name 字段；或在 .env 设 COMPOSE_PROJECT_NAME=你的名称
#
# 默认访问入口：
#   管理后台 / API / Webhook ：http://localhost/
#   节点接入                 ：ws://<本机IP>/ws/node
# =====================================================================
name: ${COMPOSE_PROJECT_NAME:-mt5hub-server}

services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpwd}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mt5hub}
      MYSQL_USER: ${MYSQL_USER:-mt5}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mt5pwd}
    volumes:
      - mysql_data:/var/lib/mysql
    expose:
      - 3306
    ports:
      - 3306:3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpwd}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8.2.7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ../backend
    env_file: .env
    environment:
      MYSQL_DSN: mysql+asyncmy://${MYSQL_USER:-mt5}:${MYSQL_PASSWORD:-mt5pwd}@mysql:3306/${MYSQL_DATABASE:-mt5hub}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    build:
      context: ..
      dockerfile: deploy/nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
