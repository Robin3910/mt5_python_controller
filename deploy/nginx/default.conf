upstream mt5_backend {
    server backend:8000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 1m;

    # WebSocket endpoints (node + admin) — require Upgrade handling
    location /ws/ {
        proxy_pass http://mt5_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # HTTP API + webhook + health + docs
    location ~ ^/(api|webhook|health|docs|redoc|openapi.json) {
        proxy_pass http://mt5_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA frontend (built into frontend/dist, mounted by compose)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

